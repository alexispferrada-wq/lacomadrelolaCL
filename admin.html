<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin — La Comadre Lola</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #E8913A;
      --secondary: #D4547B;
      --accent: #4ECDC4;
      --bg: #0d0d12;
      --bg-card: #16161f;
      --border: #2a2a3a;
      --text: #e0e0e0;
      --text-muted: #888;
      --radius: 10px;
      --success: #4caf50;
      --warning: #ff9800;
      --danger: #f44336;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    .admin-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .admin-header h1 { font-family: 'Righteous', cursive; color: var(--primary); font-size: 1.4rem; }
    .admin-header span { color: var(--text-muted); font-size: 0.85rem; }

    /* ── Layout ── */
    .admin-main { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

    /* ── Config bar ── */
    .config-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }
    .config-bar label { display: block; color: var(--text-muted); font-size: 12px; margin-bottom: 4px; }
    .config-bar input, .config-bar select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
    }
    .config-bar input:focus, .config-bar select:focus { outline: none; border-color: var(--primary); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      padding: 10px 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tab:hover:not(.active) { border-color: var(--primary); color: var(--text); }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat-card .lbl { color: var(--text-muted); font-size: 13px; margin-top: 4px; }

    /* ── Filters ── */
    .filters { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .filters select, .filters input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
    }
    .filters select:focus, .filters input:focus { outline: none; border-color: var(--primary); }
    .btn {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; font-family: 'Inter', sans-serif; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger  { background: var(--danger);  color: #fff; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      background: var(--bg-card);
      border-bottom: 2px solid var(--border);
      padding: 12px 14px;
      text-align: left;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:hover { background: rgba(232,145,58,0.04); }
    tbody td { padding: 12px 14px; vertical-align: middle; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-pendiente  { background: rgba(255,152,0,0.15); color: var(--warning); border: 1px solid rgba(255,152,0,0.3); }
    .badge-confirmada { background: rgba(76,175,80,0.15);  color: var(--success); border: 1px solid rgba(76,175,80,0.3); }
    .badge-cancelada  { background: rgba(244,67,54,0.15);  color: var(--danger);  border: 1px solid rgba(244,67,54,0.3); }

    /* ── Pagination ── */
    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; align-items: center; }
    .pagination button {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .pagination button.active { background: var(--primary); border-color: var(--primary); color: #fff; }
    .pagination button:disabled { opacity: 0.3; cursor: default; }

    /* ── Alerts ── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      font-size: 14px;
    }
    .alert-error { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.3); color: #ff8a80; }
    .alert-info  { background: rgba(78,205,196,0.1); border: 1px solid rgba(78,205,196,0.3); color: var(--accent); }

    /* ── Login ── */
    .login-wrap {
      max-width: 380px;
      margin: 80px auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px;
    }
    .login-wrap h2 { font-family: 'Righteous', cursive; color: var(--primary); text-align: center; margin-bottom: 24px; font-size: 1.6rem; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
    }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    .btn-full { width: 100%; padding: 12px; font-size: 15px; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty ── */
    .empty { text-align: center; padding: 48px; color: var(--text-muted); }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }

    @media (max-width: 600px) {
      .admin-header { flex-direction: column; align-items: flex-start; }
      .config-bar { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginWrap" class="login-wrap">
  <h2>🌹 Admin Panel</h2>
  <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:24px;">La Comadre Lola</p>
  <div id="loginError" class="alert alert-error" style="display:none;"></div>
  <div class="form-group">
    <label for="apiUrl">URL del Servidor</label>
    <input id="apiUrl" type="url" placeholder="http://localhost:3001" value="http://localhost:3001">
  </div>
  <div class="form-group">
    <label for="loginUser">Usuario</label>
    <input id="loginUser" type="text" placeholder="admin" value="admin">
  </div>
  <div class="form-group">
    <label for="loginPass">Contraseña</label>
    <input id="loginPass" type="password" placeholder="••••••••">
  </div>
  <button class="btn btn-primary btn-full" onclick="doLogin()">Ingresar</button>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard" style="display:none;">
  <div class="admin-header">
    <div>
      <h1>🌹 La Comadre Lola</h1>
      <span>Panel de Administración</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:12px;align-items:center;">
      <span id="serverTag" style="font-size:12px;color:var(--text-muted);"></span>
      <button class="btn btn-primary" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="admin-main">
    <!-- Stats -->
    <div class="stats" id="statsRow">
      <div class="stat-card"><div class="num" id="statTotal">—</div><div class="lbl">Total Reservas</div></div>
      <div class="stat-card"><div class="num" id="statPendiente" style="color:var(--warning)">—</div><div class="lbl">Pendientes</div></div>
      <div class="stat-card"><div class="num" id="statConfirmada" style="color:var(--success)">—</div><div class="lbl">Confirmadas</div></div>
      <div class="stat-card"><div class="num" id="statCancelada" style="color:var(--danger)">—</div><div class="lbl">Canceladas</div></div>
      <div class="stat-card"><div class="num" id="statNewsletter" style="color:var(--accent)">—</div><div class="lbl">Newsletter</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('reservations', this)">📋 Reservas</button>
      <button class="tab" onclick="switchTab('newsletter', this)">📧 Newsletter</button>
    </div>

    <!-- RESERVATIONS TAB -->
    <div id="tabReservations">
      <div class="filters">
        <div>
          <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:3px;">Estado</label>
          <select id="filterEstado" onchange="loadReservations(1)">
            <option value="">Todos</option>
            <option value="pendiente">Pendientes</option>
            <option value="confirmada">Confirmadas</option>
            <option value="cancelada">Canceladas</option>
          </select>
        </div>
        <div>
          <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:3px;">Fecha</label>
          <input type="date" id="filterFecha" onchange="loadReservations(1)">
        </div>
        <button class="btn btn-primary" onclick="loadReservations(1)" style="align-self:flex-end;">🔄 Actualizar</button>
        <button class="btn" style="background:var(--bg-card);border:1px solid var(--border);align-self:flex-end;" onclick="clearFilters()">Limpiar</button>
      </div>
      <div id="alertRes"></div>
      <div id="resContent" class="loading"><div class="spinner"></div></div>
      <div class="pagination" id="resPagination"></div>
    </div>

    <!-- NEWSLETTER TAB -->
    <div id="tabNewsletter" style="display:none;">
      <div class="filters">
        <button class="btn btn-primary" onclick="loadNewsletter(1)">🔄 Actualizar</button>
      </div>
      <div id="alertNews"></div>
      <div id="newsContent" class="loading"><div class="spinner"></div></div>
      <div class="pagination" id="newsPagination"></div>
    </div>
  </div>
</div>

<script>
  let AUTH = '';
  let API  = '';
  let currentResPage = 1;
  let currentNewsPage = 1;

  /* ── Login / Logout ── */
  function doLogin() {
    const url  = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;

    if (!url || !user || !pass) {
      showLoginError('Completa todos los campos.');
      return;
    }

    API  = url;
    AUTH = 'Basic ' + btoa(user + ':' + pass);

    // Verificar credenciales con una petición de prueba
    fetch(`${API}/api/reservations?limit=1`, {
      headers: { Authorization: AUTH }
    })
    .then(r => {
      if (r.status === 401) throw new Error('Usuario o contraseña incorrectos.');
      if (!r.ok) throw new Error(`Error del servidor (${r.status}).`);
      return r.json();
    })
    .then(() => {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('serverTag').textContent = API;
      loadStats();
      loadReservations(1);
    })
    .catch(err => showLoginError(err.message));
  }

  function doLogout() {
    AUTH = '';
    API  = '';
    document.getElementById('loginWrap').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginPass').value = '';
  }

  function showLoginError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  /* Allow Enter key on login form */
  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  /* ── Tabs ── */
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tabReservations').style.display = tab === 'reservations' ? '' : 'none';
    document.getElementById('tabNewsletter').style.display   = tab === 'newsletter'   ? '' : 'none';
    if (tab === 'newsletter') loadNewsletter(1);
  }

  /* ── Stats ── */
  async function loadStats() {
    try {
      const [rAll, rPend, rConf, rCanc, news] = await Promise.all([
        apiFetch('/api/reservations?limit=1'),
        apiFetch('/api/reservations?estado=pendiente&limit=1'),
        apiFetch('/api/reservations?estado=confirmada&limit=1'),
        apiFetch('/api/reservations?estado=cancelada&limit=1'),
        apiFetch('/api/newsletter?limit=1'),
      ]);
      document.getElementById('statTotal').textContent      = rAll.total  ?? '—';
      document.getElementById('statPendiente').textContent  = rPend.total ?? '—';
      document.getElementById('statConfirmada').textContent = rConf.total ?? '—';
      document.getElementById('statCancelada').textContent  = rCanc.total ?? '—';
      document.getElementById('statNewsletter').textContent = news.total  ?? '—';
    } catch { /* silencioso */ }
  }

  /* ── Reservations ── */
  async function loadReservations(page) {
    currentResPage = page;
    const estado = document.getElementById('filterEstado').value;
    const fecha  = document.getElementById('filterFecha').value;

    let qs = `?page=${page}&limit=15`;
    if (estado) qs += `&estado=${estado}`;
    if (fecha)  qs += `&fecha=${fecha}`;

    const el = document.getElementById('resContent');
    el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    document.getElementById('alertRes').innerHTML = '';

    try {
      const data = await apiFetch(`/api/reservations${qs}`);
      renderReservationsTable(data);
      renderPagination('resPagination', data.page, data.pages, loadReservations);
      loadStats();
    } catch (err) {
      showAlert('alertRes', err.message);
    }
  }

  function renderReservationsTable(data) {
    const el = document.getElementById('resContent');
    if (!data.data || data.data.length === 0) {
      el.innerHTML = '<div class="empty"><div class="icon">📋</div><p>No hay reservas que mostrar.</p></div>';
      return;
    }

    const TIPO = {
      'mesa-estandar': 'Mesa Estándar',
      'mesa-vip': 'Mesa VIP',
      'vip-gold': '🏆 VIP Gold',
      'vip-platinum': '💎 VIP Platinum',
      'vip-diamond': '💠 VIP Diamond',
      'cumpleaños': '🎂 Cumpleaños',
    };

    const rows = data.data.map(r => {
      const fecha = new Date(r.fecha).toLocaleDateString('es-CL');
      const creadoEl = new Date(r.createdAt).toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
      return `<tr>
        <td><strong>${escHtml(r.nombre)}</strong><br><small style="color:var(--text-muted)">${escHtml(r.email)}</small></td>
        <td>${escHtml(r.telefono)}</td>
        <td>${TIPO[r.tipo] || r.tipo}</td>
        <td>${fecha}</td>
        <td>${r.personas}</td>
        <td><span class="badge badge-${r.estado}">${r.estado}</span></td>
        <td>
          ${r.estado !== 'confirmada' ? `<button class="btn-sm btn-success" onclick="cambiarEstado('${r._id}','confirmada')">✓</button> ` : ''}
          ${r.estado !== 'cancelada'  ? `<button class="btn-sm btn-danger"  onclick="cambiarEstado('${r._id}','cancelada')">✗</button>` : ''}
        </td>
        <td><small style="color:var(--text-muted)">${creadoEl}</small></td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:10px;">
        ${data.total} reserva(s) encontrada(s) · Página ${data.page} de ${data.pages}
      </p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Cliente</th><th>Teléfono</th><th>Tipo</th><th>Fecha</th>
              <th>Personas</th><th>Estado</th><th>Acciones</th><th>Recibida</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  async function cambiarEstado(id, estado) {
    try {
      await apiFetch(`/api/reservations/${id}/estado`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ estado }),
      });
      loadReservations(currentResPage);
    } catch (err) {
      showAlert('alertRes', err.message);
    }
  }

  function clearFilters() {
    document.getElementById('filterEstado').value = '';
    document.getElementById('filterFecha').value  = '';
    loadReservations(1);
  }

  /* ── Newsletter ── */
  async function loadNewsletter(page) {
    currentNewsPage = page;
    const el = document.getElementById('newsContent');
    el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    document.getElementById('alertNews').innerHTML = '';

    try {
      const data = await apiFetch(`/api/newsletter?page=${page}&limit=30`);
      renderNewsletterTable(data);
      renderPagination('newsPagination', data.page, data.pages, loadNewsletter);
    } catch (err) {
      showAlert('alertNews', err.message);
    }
  }

  function renderNewsletterTable(data) {
    const el = document.getElementById('newsContent');
    if (!data.data || data.data.length === 0) {
      el.innerHTML = '<div class="empty"><div class="icon">📧</div><p>No hay suscriptores todavía.</p></div>';
      return;
    }

    const rows = data.data.map(s => {
      const fecha = new Date(s.createdAt).toLocaleDateString('es-CL');
      return `<tr>
        <td>${escHtml(s.email)}</td>
        <td><span class="badge badge-confirmada">${s.activo ? 'Activo' : 'Inactivo'}</span></td>
        <td>${fecha}</td>
        <td><small style="color:var(--text-muted)">${s.emailBienvenidaEnviado ? '✅ Enviado' : '—'}</small></td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:10px;">
        ${data.total} suscriptor(es) activo(s) · Página ${data.page} de ${data.pages}
      </p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Email</th><th>Estado</th><th>Fecha</th><th>Email Bienvenida</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  /* ── Helpers ── */
  async function apiFetch(path, options = {}) {
    const res = await fetch(`${API}${path}`, {
      ...options,
      headers: { Authorization: AUTH, ...(options.headers || {}) },
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.message || `Error ${res.status}`);
    return json;
  }

  function renderPagination(containerId, page, pages, fn) {
    const el = document.getElementById(containerId);
    if (pages <= 1) { el.innerHTML = ''; return; }

    let html = `<button onclick="fn(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹ Anterior</button>`;
    for (let i = 1; i <= pages; i++) {
      html += `<button class="${i === page ? 'active' : ''}" onclick="fn(${i})">${i}</button>`;
    }
    html += `<button onclick="fn(${page + 1})" ${page >= pages ? 'disabled' : ''}>Siguiente ›</button>`;
    el.innerHTML = html;

    // Bind fn to correct function
    el.querySelectorAll('button').forEach(btn => {
      btn.onclick = function() { fn(parseInt(this.textContent) || (page + (this.textContent.includes('›') ? 1 : -1))); };
    });
    // Re-bind cleanly
    el.innerHTML = '';
    const prev = document.createElement('button');
    prev.textContent = '‹ Anterior';
    prev.disabled = page <= 1;
    prev.onclick = () => fn(page - 1);
    el.appendChild(prev);

    for (let i = 1; i <= pages; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      if (i === page) btn.classList.add('active');
      btn.onclick = () => fn(i);
      el.appendChild(btn);
    }

    const next = document.createElement('button');
    next.textContent = 'Siguiente ›';
    next.disabled = page >= pages;
    next.onclick = () => fn(page + 1);
    el.appendChild(next);
  }

  function showAlert(id, msg) {
    document.getElementById(id).innerHTML =
      `<div class="alert alert-error">⚠️ ${escHtml(msg)}</div>`;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
</body>
</html>
